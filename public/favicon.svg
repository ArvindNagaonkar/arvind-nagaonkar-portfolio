<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#08080d" rx="4"/>
  <!-- Top-left corner accent lines (manga panel feel) -->
  <rect x="0" y="0" width="32" height="2" fill="#e83c3c" rx="1"/>
  <!-- A in cream, N in red — mirrors the nav logo style -->
  <text x="3" y="24"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900"
        font-size="18"
        letter-spacing="-1"
        fill="#e8e0d0">A</text>
  <text x="15" y="24"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-weight="900"
        font-size="18"
        letter-spacing="-1"
        fill="#e83c3c">N</text>
</svg>
