<script type="text/babel">

// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
//     "primaryColor": "#D97757",
//     "fontSize": 16,
//     "density": "regular",
//     "dark": false
//   }/*EDITMODE-END*/;
//
//   function App() {
//     const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
//     return (
//       <div style={{ fontSize: t.fontSize, color: t.primaryColor }}>
//         Hello
//         <TweaksPanel>
//           <TweakSection label="Typography" />
//           <TweakSlider label="Font size" value={t.fontSize} min={10} max={32} unit="px"
//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}

  .twk-slider{appearance:none;-webkit-appearance:none;width:100%;height:4px;margin:6px 0;
    border-radius:999px;background:rgba(0,0,0,.12);outline:none}
  .twk-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
    width:14px;height:14px;border-radius:50%;background:#fff;
    border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}
  .twk-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

  .twk-seg{position:relative;display:flex;padding:2px;border-radius:8px;
    background:rgba(0,0,0,.06);user-select:none}
  .twk-seg-thumb{position:absolute;top:2px;bottom:2px;border-radius:6px;
    background:rgba(255,255,255,.9);box-shadow:0 1px 2px rgba(0,0,0,.12);
    transition:left .15s cubic-bezier(.3,.7,.4,1),width .15s}
  .twk-seg.dragging .twk-seg-thumb{transition:none}
  .twk-seg button{appearance:none;position:relative;z-index:1;flex:1;border:0;
    background:transparent;color:inherit;font:inherit;font-weight:500;height:22px;
    border-radius:6px;cursor:default;padding:0}

  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}

  .twk-num{display:flex;align-items:center;height:26px;padding:0 0 0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}
  .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;
    user-select:none;padding-right:8px}
  .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;
    font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;
    outline:none;color:inherit;-moz-appearance:textfield}
  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
    -webkit-appearance:none;margin:0}
  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}

  .twk-btn{appearance:none;height:26px;padding:0 12px;border:0;border-radius:7px;
    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}
  .twk-btn:hover{background:rgba(0,0,0,.88)}
  .twk-btn.secondary{background:rgba(0,0,0,.06);color:inherit}
  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
  .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
  .twk-swatch::-moz-color-swatch{border:0;border-radius:5.5px}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
section[id]{scroll-margin-top:64px}
body{font-family:'Space Grotesk',sans-serif;background:#08080d;color:#e8e0d0;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.display{font-family:'Bebas Neue',sans-serif}
.jp{font-family:'Noto Serif JP',serif}
::selection{background:rgba(232,60,60,0.25)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#08080d}
::-webkit-scrollbar-thumb{background:#e83c3c66;border-radius:2px}

.panel{border:1px solid #1e1e2e;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,60,60,0.03) 0%,transparent 60%);pointer-events:none}
.scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);pointer-events:none;z-index:998;opacity:0.35}
.chapter-mark{display:inline-flex;align-items:center;gap:10px;margin-bottom:16px}
.chapter-mark::before{content:'';display:block;width:20px;height:2px;background:var(--acc,#e83c3c)}

/* reveal */
.reveal{opacity:0;transform:translateY(32px);transition:opacity 0.75s ease,transform 0.75s ease}
.reveal.in{opacity:1;transform:none}

/* ── SMOOTH GLITCH: clip-path sweep + subtle shift ── */
@keyframes smoothGlitch {
  0%,100%   { clip-path:none; transform:none; opacity:1; filter:none; }
  8%        { clip-path:polygon(0 10%,100% 10%,100% 13%,0 13%); transform:translateX(-4px); opacity:0.9; filter:brightness(1.3); }
  10%       { clip-path:none; transform:none; opacity:1; filter:none; }
  18%       { clip-path:polygon(0 55%,100% 55%,100% 60%,0 60%); transform:translateX(3px); opacity:0.92; }
  20%       { clip-path:none; transform:none; opacity:1; }
  48%       { clip-path:polygon(0 30%,100% 30%,100% 70%,0 70%); transform:translateX(-2px) skewX(-1deg); opacity:0.95; filter:brightness(1.1); }
  50%       { clip-path:none; transform:none; opacity:1; filter:none; }
  68%       { clip-path:polygon(0 80%,100% 80%,100% 84%,0 84%); transform:translateX(4px); opacity:0.9; }
  70%       { clip-path:none; transform:none; opacity:1; }
}

@keyframes radarSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes blipPulse{0%,100%{opacity:0.9}50%{opacity:0.4}}
@keyframes modalIn{from{opacity:0;transform:translateY(40px) scale(0.97)}to{opacity:1;transform:none}}
@keyframes backdropIn{from{opacity:0}to{opacity:1}}
@keyframes lf{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}

/* ── JP TOOLTIP ── */
.jp-tip{position:relative;cursor:help;display:inline-block}
.jp-tip .tip-box{
  position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);
  background:#0f0f1c;border:1px solid #2a2a3e;
  padding:7px 12px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity 0.2s;z-index:800;

/* ── SCRAMBLE TEXT ── */
const SCRAMBLE_CHARS = 'アイウエオカキクケコ#$%&@X*!?/\\01';
function ScrambleText({ text, accent, trigger, className, style }) {
  const [display, setDisplay] = React.useState(()=>text.split('').map(()=>SCRAMBLE_CHARS[Math.floor(Math.random()*SCRAMBLE_CHARS.length)]));
  const locked = React.useRef(new Array(text.length).fill(false));
  const raf = React.useRef(null);
  const t0 = React.useRef(null);
  const glitchTimer = React.useRef(null);

  const scheduleGlitch = React.useCallback(() => {
    glitchTimer.current = setTimeout(() => {
      const idx = Math.floor(Math.random()*text.length);
      setDisplay(prev => { const n=[...prev]; n[idx]=SCRAMBLE_CHARS[Math.floor(Math.random()*SCRAMBLE_CHARS.length)]; return n; });
      setTimeout(() => { setDisplay(text.split('')); scheduleGlitch(); }, 80+Math.random()*120);
    }, 3500+Math.random()*4000);
  }, [text]);

  React.useEffect(() => {
    if (!trigger) return;
    locked.current = new Array(text.length).fill(false);
    t0.current = null;
    const TOTAL = 1600, STEP = TOTAL / text.length;
    function tick(ts) {
      if (!t0.current) t0.current = ts;
      const elapsed = ts - t0.current;
      const lockN = Math.min(text.length, Math.floor(elapsed/STEP));
      for (let i=0;i<lockN;i++) locked.current[i]=true;
      setDisplay(text.split('').map((ch,i)=>locked.current[i]?ch:SCRAMBLE_CHARS[Math.floor(Math.random()*SCRAMBLE_CHARS.length)]));
      if (lockN < text.length) { raf.current = requestAnimationFrame(tick); }
      else { setDisplay(text.split('')); scheduleGlitch(); }
    }
    raf.current = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf.current); clearTimeout(glitchTimer.current); };
  }, [trigger, text, scheduleGlitch]);

  return (
    <h1 className={className} style={style}>
      {display.map((ch,i) => (
        <span key={i} style={{color: locked.current[i] ? accent : `${accent}80`, display:'inline-block', transition:'color 0.06s'}}>{ch}</span>
      ))}
    </h1>
  );
}

function useReveal(ref, delay=0) {
  React.useEffect(()=>{
    if(!ref.current) return;
    const el=ref.current;
    el.style.transitionDelay=`${delay}ms`;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('in');obs.disconnect()}},{threshold:0.12});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
}

/* ── CANVAS ── */
function initHeroCanvas(accent, enabled) {
  const canvas=document.getElementById('hero-canvas');
  if(!canvas) return ()=>{};
  if(!enabled){canvas.style.opacity='0';return ()=>{};}
  canvas.style.opacity='0.6';
  const ctx=canvas.getContext('2d');
  let W,H,nodes=[],dataStreams=[],raf;
  const hexToRgb=h=>({r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)});
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  nodes=Array.from({length:34},()=>({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-0.5)*0.18, vy:(Math.random()-0.5)*0.18,
    r:Math.random()*1.8+0.8, pulse:Math.random()*Math.PI*2,
  }));

  const CHARS='01アイウエオカキクケコ ABCDEF0123456789';
  dataStreams=Array.from({length:12},(_,i)=>({
    x:W*0.52+i*48+Math.random()*16,
    drops:Array.from({length:7},()=>({y:Math.random()*H,speed:0.35+Math.random()*0.55,char:CHARS[Math.floor(Math.random()*CHARS.length)],opacity:0.06+Math.random()*0.09,t:Math.random()*60})),
  }));

  const ac=hexToRgb(accent);
  function draw(){
    ctx.clearRect(0,0,W,H);

    // Hex grid — right half only
    ctx.strokeStyle=`rgba(${ac.r},${ac.g},${ac.b},0.05)`;
    ctx.lineWidth=0.5;
    const hs=38;
    for(let row=0;row<H/hs+2;row++){
      for(let col=0;col<W/hs+2;col++){
        const cx=col*hs*1.732+(row%2)*hs*0.866, cy=row*hs*1.5;
        if(cx<W*0.28) continue;
        ctx.beginPath();
        for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;i===0?ctx.moveTo(cx+hs*0.82*Math.cos(a),cy+hs*0.82*Math.sin(a)):ctx.lineTo(cx+hs*0.82*Math.cos(a),cy+hs*0.82*Math.sin(a));}
        ctx.closePath();ctx.stroke();
      }
    }

    // Data streams
    dataStreams.forEach(s=>s.drops.forEach(d=>{
      d.y+=d.speed; d.t--;
      if(d.t<=0){d.char=CHARS[Math.floor(Math.random()*CHARS.length)];d.t=25+Math.random()*70;}
      if(d.y>H) d.y=-16;
      ctx.fillStyle=`rgba(${ac.r},${ac.g},${ac.b},${d.opacity})`;
      ctx.font='11px JetBrains Mono,monospace';
      ctx.fillText(d.char,s.x,d.y);
    }));

    // ── CONNECTION LINES — brighter, longer reach ──
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<180){
          const alpha=(1-d/180)*0.55;
          ctx.strokeStyle=`rgba(${ac.r},${ac.g},${ac.b},${alpha})`;
          ctx.lineWidth=0.7;
          ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();
        }
      }
    }

    // Nodes with glow
    nodes.forEach(n=>{
      n.x+=n.vx;n.y+=n.vy;n.pulse+=0.02;
      if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
      const p=0.5+0.5*Math.sin(n.pulse);
      // glow ring
      ctx.strokeStyle=`rgba(${ac.r},${ac.g},${ac.b},${0.15*p})`;
      ctx.lineWidth=0.8;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.stroke();
      // core
      ctx.fillStyle=`rgba(${ac.r},${ac.g},${ac.b},${0.55+p*0.45})`;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r*(1+p*0.4),0,Math.PI*2);ctx.fill();
    });

    raf=requestAnimationFrame(draw);
  }
  draw();
  return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
}

  {type:'cursor'},
];

function TerminalAnim({accent}){
  const [lines, setLines] = React.useState([]);
  const [typing, setTyping] = React.useState('');
  const scrollRef = React.useRef();

  React.useEffect(()=>{
    let cancelled = false;
    let lineIdx = 0;

    async function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

    async function typePrompt(text){
      for(let i=0;i<=text.length;i++){
        if(cancelled) return;
        setTyping(text.slice(0,i));
        await sleep(28 + Math.random()*18);
      }
    }

    async function run(){
      await sleep(600);
      while(!cancelled){
        for(const item of TERMINAL_SEQUENCE){
          if(cancelled) return;
          if(item.type==='gap'){ setLines(l=>[...l,{type:'gap',id:lineIdx++}]); await sleep(180); continue; }
          if(item.type==='cursor'){
            setTyping('');
            await sleep(1800);
            if(!cancelled) setLines([]);
            break;
          }
          if(item.type==='prompt'){
            setTyping('');
            await typePrompt(item.text);
            if(cancelled) return;
            setLines(l=>[...l,{type:'prompt',text:item.text,id:lineIdx++}]);
            setTyping('');
            await sleep(120);
          } else {
            await sleep(item.delay||60);
            if(cancelled) return;
            setLines(l=>[...l,{type:item.type,text:item.text,id:lineIdx++}]);
            if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
          }
        }
      }
    }
    run();
    return()=>{ cancelled=true; };
  },[]);

  React.useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  },[lines]);

  const col = {
    prompt: '#e8e0d0',
    output:  '#6a7a8a',
    success: accent,
    gap:     'transparent',
  };

  return(
    <div style={{width:320,background:'#06060f',border:`1px solid ${accent}30`,fontFamily:'JetBrains Mono',fontSize:11,position:'relative',overflow:'hidden'}}>
      {/* scanlines */}
      <div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px)',pointerEvents:'none',zIndex:5}}></div>
      {/* Title bar */}
      <div style={{padding:'8px 14px',borderBottom:`1px solid ${accent}18`,display:'flex',alignItems:'center',gap:10,background:'#08080f'}}>
        <div style={{display:'flex',gap:6}}>
          {['#ff5f57','#febc2e','#28c840'].map((c,i)=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:c,opacity:0.7}}></div>)}
        </div>
        <span style={{fontSize:9,color:'#3a3a52',letterSpacing:2,flex:1,textAlign:'center'}}>NOC_TERMINAL — arvind@jio-ild</span>
      </div>
      {/* Output */}
      <div ref={scrollRef} style={{padding:'14px',height:248,overflowY:'auto',display:'flex',flexDirection:'column',gap:3}}>
        {lines.map(line=>(
          line.type==='gap'
            ? <div key={line.id} style={{height:6}}/>
            : <div key={line.id} style={{color:col[line.type]||col.output,lineHeight:1.6,letterSpacing:0.5}}>
                {line.type==='prompt' && <span style={{color:accent,marginRight:8}}>$</span>}
                {line.type==='success' && <span style={{color:accent,marginRight:8}}>✓</span>}
                {line.text}
              </div>
        ))}
        {/* Active typing line */}
        {typing!==undefined && (
          <div style={{color:col.prompt,lineHeight:1.6}}>
            <span style={{color:accent,marginRight:8}}>$</span>
            {typing}<span style={{animation:'blipPulse 0.8s infinite',display:'inline-block',width:7,height:12,background:accent,marginLeft:1,verticalAlign:'text-bottom'}}></span>
          </div>
        )}
      </div>
      {/* Bottom bar */}
      <div style={{padding:'6px 14px',borderTop:`1px solid ${accent}15`,display:'flex',justifyContent:'space-between'}}>
        <span style={{fontSize:9,color:'#2a2a3a',letterSpacing:1}}>JIO-ILD · LIVE</span>
        <span style={{fontSize:9,color:accent,letterSpacing:1,animation:'blipPulse 2s infinite'}}>● CONNECTED</span>
      </div>
      {/* Corner brackets */}
      {[[0,0],[1,0],[0,1],[1,1]].map(([rx,ry],i)=>(
        <div key={i} style={{position:'absolute',width:10,height:10,top:ry?undefined:0,bottom:ry?0:undefined,left:rx?undefined:0,right:rx?0:undefined,
          borderTop:!ry?`1px solid ${accent}50`:undefined,borderBottom:ry?`1px solid ${accent}50`:undefined,
          borderLeft:!rx?`1px solid ${accent}50`:undefined,borderRight:rx?`1px solid ${accent}50`:undefined}}></div>
      ))}
    </div>
  );
}

function Radar({accent}){
  const cx=120,cy=120;
  const dots=[{r:38,a:40},{r:62,a:130},{r:80,a:200},{r:45,a:290},{r:70,a:75},{r:55,a:330}];
  return(
    <svg viewBox="0 0 240 240" width="300" height="300">
      <defs>
        <radialGradient id="rg2"><stop offset="0%" stopColor={accent} stopOpacity="0.1"/><stop offset="100%" stopColor={accent} stopOpacity="0"/></radialGradient>
        <filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle cx={cx} cy={cy} r="110" fill="url(#rg2)"/>
      {[30,60,90,110].map(r=><circle key={r} cx={cx} cy={cy} r={r} fill="none" stroke={accent} strokeWidth="0.5" strokeOpacity="0.2"/>)}
      {[0,45,90,135].map(a=>{const rad=a*Math.PI/180;return<line key={a} x1={cx-Math.cos(rad)*110} y1={cy-Math.sin(rad)*110} x2={cx+Math.cos(rad)*110} y2={cy+Math.sin(rad)*110} stroke={accent} strokeWidth="0.4" strokeOpacity="0.15"/>})}
      <g style={{transformOrigin:`${cx}px ${cy}px`,animation:'radarSpin 4s linear infinite'}}>
        <path d={`M${cx},${cy} L${cx},${cy-110} A110,110 0 0,1 ${cx+110*Math.sin(Math.PI/3)},${cy-110*Math.cos(Math.PI/3)} Z`} fill="url(#rg2)" opacity="0.7"/>
        <line x1={cx} y1={cy} x2={cx} y2={cy-110} stroke={accent} strokeWidth="1.2" strokeOpacity="0.8" filter="url(#glow2)"/>

/* ── APP ── */
function App(){
  const [tweaks,setTweak]=useTweaks(TWEAK_DEFAULTS);
  const [ready,setReady]=React.useState(false);
  const acc=tweaks.accentColor;
  React.useEffect(()=>{
    const cleanup=initHeroCanvas(acc,tweaks.bgAnim);
    return cleanup;
  },[acc,tweaks.bgAnim]);
  return(
    <>
      {!ready&&<Intro accent={acc} onDone={()=>setReady(true)}/>}
      <div style={{opacity:ready?1:0,transition:'opacity 0.6s'}}>
        <Nav accent={acc}/>
        <Hero accent={acc} showRadar={tweaks.showRadar}/>
        <Skills accent={acc} showKanji={tweaks.showKanji}/>
        <Experience accent={acc} showKanji={tweaks.showKanji}/>
        <Projects accent={acc} showKanji={tweaks.showKanji}/>
        <Credentials accent={acc} showKanji={tweaks.showKanji}/>
        <Contact accent={acc}/>
      </div>
      <TweaksPanel>
        <TweakSection label="Accent">
          <TweakColor label="Primary Color" value={tweaks.accentColor} onChange={v=>setTweak('accentColor',v)}/>
        </TweakSection>
        <TweakSection label="Presets">
          <TweakRadio label="Theme" value={tweaks.accentColor}
            options={[{value:"#e83c3c",label:"Signal Red"},{value:"#f0a832",label:"Amber"},{value:"#3c8ae8",label:"Data Blue"},{value:"#a64ce8",label:"Violet"}]}
            onChange={v=>setTweak('accentColor',v)}/>
        </TweakSection>
        <TweakSection label="Elements">
          <TweakToggle label="Background animation" value={tweaks.bgAnim} onChange={v=>setTweak('bgAnim',v)}/>
          <TweakToggle label="Radar (hero)" value={tweaks.showRadar} onChange={v=>setTweak('showRadar',v)}/>
          <TweakToggle label="Kanji watermarks" value={tweaks.showKanji} onChange={v=>setTweak('showKanji',v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
